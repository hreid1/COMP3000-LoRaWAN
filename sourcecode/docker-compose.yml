services:
  backend:
    build:
      context: ./backend
    container_name: lorawan-backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./backend/db.sqlite3:/app/db.sqlite3
      - ./backend/profile_images:/app/profile_images
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

  frontend:
    build:
      context: ./my-app
    container_name: lorawan-frontend
    volumes:
      - ./my-app:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
